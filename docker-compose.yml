name: studymate

services:
  mongodb:
    image: mongo:7.0
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: studymate
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME:?Set MONGO_ROOT_USERNAME in .env}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:?Set MONGO_ROOT_PASSWORD in .env}
    volumes:
      - mongo_data:/data/db
    networks:
      - studymate
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mongosh --quiet --username \"$${MONGO_INITDB_ROOT_USERNAME}\" --password \"$${MONGO_INITDB_ROOT_PASSWORD}\" --authenticationDatabase admin --eval \"db.adminCommand('ping').ok\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  ml-service:
    build:
      context: ./ml_service
    restart: unless-stopped
    networks:
      - studymate
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  ai-agent:
    build:
      context: ./ai_agent
    restart: unless-stopped
    env_file:
      - ./ai_agent/.env
    environment:
      STUDYMIND_DB_PATH: /app/studymind_db
      CHAT_DB_PATH: /app/data/chat_history.sqlite3
      BACKEND_API_URL: http://backend:8080/api
      ALLOWED_ORIGINS: ${FRONTEND_URL:-http://localhost}
      UVICORN_WORKERS: ${AI_AGENT_WORKERS:-1}
    volumes:
      - ai_agent_db:/app/studymind_db
      - ai_agent_data:/app/data
    networks:
      - studymate
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      MONGO_URI: mongodb://${MONGO_ROOT_USERNAME}:${MONGO_ROOT_PASSWORD}@mongodb:27017/studymate?authSource=admin
      ML_SERVICE_URL: http://ml-service:8000
      AI_AGENT_URL: http://ai-agent:8001
      UPLOAD_DIR: /app/uploads
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      APP_PUBLIC_BASE_URL: ${APP_PUBLIC_BASE_URL:-http://localhost/api}
      LOGGING_LEVEL_COM_STUDYMATE: ${APP_LOG_LEVEL:-INFO}
      LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_WEB_MULTIPART: ${APP_LOG_LEVEL:-INFO}
      LOGGING_LEVEL_ORG_APACHE_CATALINA_CONNECTOR_REQUEST: ${APP_LOG_LEVEL:-INFO}
    depends_on:
      mongodb:
        condition: service_healthy
      ml-service:
        condition: service_healthy
      ai-agent:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads
    networks:
      - studymate
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8080/api/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - studymate
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  gateway:
    image: caddy:2.8-alpine
    restart: unless-stopped
    environment:
      SITE_ADDRESS: ${SITE_ADDRESS:-http://localhost}
    depends_on:
      frontend:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - studymate
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:2019/config/"]
      interval: 30s
      timeout: 5s
      retries: 3

  mongodb-backup:
    image: mongo:7.0
    restart: unless-stopped
    environment:
      MONGO_ROOT_USERNAME: ${MONGO_ROOT_USERNAME:?Set MONGO_ROOT_USERNAME in .env}
      MONGO_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:?Set MONGO_ROOT_PASSWORD in .env}
      BACKUP_INTERVAL_SECONDS: ${BACKUP_INTERVAL_SECONDS:-86400}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-7}
    depends_on:
      mongodb:
        condition: service_healthy
    command: ["sh", "/scripts/mongo-backup.sh"]
    volumes:
      - ./deploy/mongo-backup.sh:/scripts/mongo-backup.sh:ro
      - ./backups:/backups
    networks:
      - studymate

  volume-backup:
    image: alpine:3.20
    restart: unless-stopped
    environment:
      BACKUP_INTERVAL_SECONDS: ${BACKUP_INTERVAL_SECONDS:-86400}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-7}
    command: ["sh", "/scripts/volume-backup.sh"]
    volumes:
      - ./deploy/volume-backup.sh:/scripts/volume-backup.sh:ro
      - ./backups:/backups
      - uploads_data:/data/uploads:ro
      - ai_agent_data:/data/ai-agent-data:ro
      - ai_agent_db:/data/ai-agent-db:ro
    depends_on:
      ai-agent:
        condition: service_healthy
      backend:
        condition: service_healthy

volumes:
  mongo_data:
  uploads_data:
  ai_agent_db:
  ai_agent_data:
  caddy_data:
  caddy_config:

networks:
  studymate:
    driver: bridge
