server:
  port: ${PORT:8080}
  servlet:
    context-path: /api

spring:
  application:
    name: studymate-api
  data:
    mongodb:
      uri: ${MONGO_URI}        
      database: studymate
      auto-index-creation: true
  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 100MB
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - email
              - profile
            redirect-uri: "${APP_PUBLIC_BASE_URL}/login/oauth2/code/google"
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME}
  api-key: ${CLOUDINARY_API_KEY}
  api-secret: ${CLOUDINARY_API_SECRET}

app:
  jwt:
    secret: ${JWT_SECRET}        # ❌ Xóa default value
    access-token-expiration: 86400000
    refresh-token-expiration: 604800000
  ml-service:
    url: ${ML_SERVICE_URL}
  public-base-url: ${APP_PUBLIC_BASE_URL}
  cors:
    allowed-origins:
      - ${FRONTEND_URL}
  frontend-url: ${FRONTEND_URL}
  admin:
    email: ${ADMIN_EMAIL}
    password: ${ADMIN_PASSWORD}  # ❌ Xóa default value
  openai:
    api-key: ${OPENAI_API_KEY}
    base-url: ${OPENAI_BASE_URL:https://openrouter.ai/api/v1}
    model: ${OPENAI_MODEL:openai/gpt-4.1-mini}
    vision-model: ${OPENAI_VISION_MODEL:openai/gpt-4o-mini}

logging:
  level:
    com.studymate: INFO           # Đổi DEBUG → INFO khi production
    org.springframework.security: WARN