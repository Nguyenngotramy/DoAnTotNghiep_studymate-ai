server:
  port: ${PORT:8080}
  forward-headers-strategy: framework
  servlet:
    context-path: /api

spring:
  application:
    name: studymate-api

  data:
    mongodb:
      uri: ${MONGO_URI}
      database: studymate
      auto-index-creation: true

  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 100MB
      file-size-threshold: 2KB

  websocket:
    message-size-limit: 65536

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - email
              - profile
            redirect-uri: "${APP_PUBLIC_BASE_URL}/login/oauth2/code/google"
        provider:
          google:
            authorization-uri: https://accounts.google.com/o/oauth2/v2/auth
            token-uri: https://oauth2.googleapis.com/token
            user-info-uri: https://www.googleapis.com/oauth2/v3/userinfo
            user-name-attribute: sub

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
        connectiontimeout: 10000
        timeout: 10000
        writetimeout: 10000

  task:
    execution:
      pool:
        core-size: 2
        max-size: 5

cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME}
  api-key: ${CLOUDINARY_API_KEY}
  api-secret: ${CLOUDINARY_API_SECRET}

app:
  jwt:
    secret: ${JWT_SECRET}
    access-token-expiration: 86400000
    refresh-token-expiration: 604800000

  ml-service:
    url: ${ML_SERVICE_URL}

  ai-agent:
    url: ${AI_AGENT_URL:${ML_SERVICE_URL}}
    service-key: ${AI_AGENT_SERVICE_KEY:}
    timeout-seconds: ${AI_AGENT_TIMEOUT_SECONDS:45}

  upload:
    dir: ${UPLOAD_DIR:./uploads}
    max-size: 52428800

  public-base-url: ${APP_PUBLIC_BASE_URL}

  cors:
    allowed-origins:
      - http://localhost:3000
      - http://localhost:3001
      - http://localhost:3010
      - http://localhost:5173
      - http://localhost:5174
      - http://localhost:5175

  frontend-url: ${FRONTEND_URL}
  name: StudyMate AI

  admin:
    email: ${ADMIN_EMAIL}
    password: ${ADMIN_PASSWORD}
    fullName: Admin System

  openai:
    api-key: ${OPENAI_API_KEY}
    base-url: ${OPENAI_BASE_URL:https://openrouter.ai/api/v1}
    model: ${OPENAI_MODEL:openai/gpt-4.1-mini}
    vision-model: ${OPENAI_VISION_MODEL:openai/gpt-4o-mini}

payment:
  momo:
    partner-code: ${MOMO_PARTNER_CODE:}
    access-key: ${MOMO_ACCESS_KEY:}
    secret-key: ${MOMO_SECRET_KEY:}
    api-endpoint: ${MOMO_API_ENDPOINT:https://test-payment.momo.vn/v2/gateway/api/create}
    redirect-url: ${MOMO_REDIRECT_URL:${FRONTEND_URL}/payment/result/momo}
    ipn-url: ${MOMO_IPN_URL:${APP_PUBLIC_BASE_URL}/payment/momo/callback}
  vnpay:
    tmn-code: ${VNPAY_TMN_CODE:}
    hash-secret: ${VNPAY_HASH_SECRET:}
    api-url: ${VNPAY_API_URL:https://sandbox.vnpayment.vn/paymentv2/vpcpay.html}
    return-url: ${VNPAY_RETURN_URL:${FRONTEND_URL}/payment/result/vnpay}

logging:
  level:
    com.studymate: DEBUG
    org.springframework.data.mongodb: INFO
    org.springframework.security: INFO
    org.springframework.web.multipart: DEBUG
    org.apache.catalina.connector.Request: DEBUG

management:
  health:
    mail:
      enabled: false
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
