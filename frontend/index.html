<!doctype html>
<html lang="vi">
<head>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&family=Plus+Jakarta+Sans:wght@500;600;700;800&family=Playfair+Display:wght@600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <meta charset="UTF-8" />
  <meta name="theme-color" content="#f6f7fb" />
  <script>
    (() => {
      let darkMode = false
      try {
        const saved = JSON.parse(localStorage.getItem('studymate-ui-v2') || '{}')
        darkMode = saved?.state?.darkMode === true
      } catch {}
      const theme = darkMode ? 'dark' : 'light'
      document.documentElement.dataset.theme = theme
      document.documentElement.classList.toggle('dark', darkMode)
      document.documentElement.style.colorScheme = theme
    })()
  </script>

  <link rel="icon" type="image/png" sizes="32x32" href="/studymate-favicon-32x32.png?v=4" />
  <link rel="icon" type="image/png" sizes="64x64" href="/studymate-favicon-64x64.png?v=4" />
  <link rel="icon" type="image/png" sizes="192x192" href="/studymate-favicon-192x192.png?v=4" />
  <link rel="apple-touch-icon" href="/studymate-favicon-180x180.png?v=4" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StudyMate AI</title>
</head>

<body>
<div id="root"></div>
<script type="module" src="/src/main.tsx"></script>
</body>
</html>
